<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="RRHH"/>
  <meta name="theme-color" content="#1e293b"/>
  <title>Recursos Humanos</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.svg"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
    body{margin:0;background:#f8fafc;overscroll-behavior:none}
    input,textarea,select{font-size:16px!important;font-family:inherit}
    button{font-family:inherit}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

const todayISO=()=>new Date().toISOString().split('T')[0];
const CY=new Date().getFullYear();
const CM=new Date().getMonth();
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const yearOf=iso=>parseInt(iso.slice(0,4),10);
const monthOf=iso=>parseInt(iso.slice(5,7),10)-1;
const fmt=iso=>new Date(iso+'T12:00:00').toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);

function weeksAndDays(isoTarget){
  const now=new Date();now.setHours(0,0,0,0);
  const tgt=new Date(isoTarget+'T00:00:00');
  const diff=Math.ceil((tgt-now)/86400000);
  if(diff<=0)return null;
  return{weeks:Math.floor(diff/7),days:diff%7,total:diff};
}

function nextCobro(){
  const now=new Date();now.setHours(0,0,0,0);
  let y=now.getFullYear(),m=now.getMonth();
  let cobro=new Date(y,m,28);
  if(cobro<=now){m++;if(m>11){m=0;y++;}cobro=new Date(y,m,28);}
  const diff=Math.ceil((cobro-now)/86400000);
  return{date:cobro,weeks:Math.floor(diff/7),days:diff%7,total:diff};
}

const lsLoad=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}};
const lsSave=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){console.error(e);}};

/* SVG icons */
function IconPlus(){return(<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>);}
function IconEdit(){return(<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>);}
function IconTrash(){return(<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>);}
function IconX({s=18}){return(<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>);}
function IconChk(){return(<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>);}

const ACCENT={
  red:    '#dc2626', redL:'#fee2e2',
  blue:   '#2563eb', blueL:'#dbeafe',
  emerald:'#059669', emeraldL:'#d1fae5',
  amber:  '#d97706', amberL:'#fef3c7',
  purple: '#7c3aed', purpleL:'#ede9fe',
};

function Stat({label,value,unit,color}){
  return(
    <div style={{background:'white',borderRadius:12,border:'1px solid #e2e8f0',padding:'10px 12px',flex:1,minWidth:0}}>
      <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'0.05em',color:'#94a3b8',fontWeight:600}}>{label}</div>
      <div style={{fontSize:26,fontWeight:800,color:color,marginTop:2,lineHeight:1}}>{value}</div>
      <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{unit}</div>
    </div>
  );
}

function SHead({emoji,title,sub,bg}){
  return(
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      <div style={{width:40,height:40,borderRadius:12,background:bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{emoji}</div>
      <div>
        <div style={{fontWeight:800,fontSize:16,color:'#1e293b'}}>{title}</div>
        <div style={{fontSize:11,color:'#94a3b8'}}>{sub}</div>
      </div>
    </div>
  );
}

function AddBtn({label,color,onClick}){
  return(
    <button onClick={onClick} style={{width:'100%',background:color,color:'white',border:'none',borderRadius:12,padding:'13px 0',display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontWeight:600,fontSize:15,cursor:'pointer'}}>
      <IconPlus/>{label}
    </button>
  );
}

function Form({title,fields,initial,onSave,onCancel,color}){
  const [d,setD]=useState({...initial});
  const submit=()=>{
    for(const f of fields)if(f.req&&!String(d[f.name]||'').trim()){alert('Completá: '+f.label);return;}
    onSave(d);
  };
  const inp={width:'100%',padding:'10px 12px',border:'1px solid #cbd5e1',borderRadius:8,fontSize:16,boxSizing:'border-box',outline:'none'};
  return(
    <div style={{background:'white',borderRadius:12,border:'1px solid #e2e8f0',boxShadow:'0 2px 8px rgba(0,0,0,0.06)',padding:16,display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontWeight:700,color:'#1e293b'}}>{title}</span>
        <button onClick={onCancel} style={{background:'none',border:'none',cursor:'pointer',color:'#94a3b8',padding:4}}><IconX/></button>
      </div>
      {fields.map(f=>(
        <div key={f.name}>
          <label style={{display:'block',fontSize:12,fontWeight:600,color:'#64748b',marginBottom:4}}>{f.label}{f.req&&<span style={{color:'#ef4444'}}> *</span>}</label>
          {f.type==='textarea'
            ?<textarea rows={3} value={d[f.name]||''} onChange={e=>setD({...d,[f.name]:e.target.value})} placeholder={f.ph||''} style={{...inp,resize:'none'}}/>
            :<input type={f.type||'text'} step={f.step} min={f.min} value={d[f.name]||''} onChange={e=>setD({...d,[f.name]:e.target.value})} placeholder={f.ph||''} style={inp}/>
          }
        </div>
      ))}
      <div style={{display:'flex',gap:8,marginTop:4}}>
        <button onClick={onCancel} style={{flex:1,padding:'11px 0',borderRadius:8,border:'1px solid #cbd5e1',background:'white',color:'#475569',fontWeight:600,cursor:'pointer'}}>Cancelar</button>
        <button onClick={submit}   style={{flex:1,padding:'11px 0',borderRadius:8,border:'none',background:color,color:'white',fontWeight:600,cursor:'pointer'}}>Guardar</button>
      </div>
    </div>
  );
}

function Item({item,onEdit,onDelete,children}){
  const [conf,setConf]=useState(false);
  return(
    <div style={{background:'white',borderRadius:12,border:'1px solid #e2e8f0',padding:12,display:'flex',gap:8}}>
      <div style={{flex:1,minWidth:0}}>{children}</div>
      <div style={{display:'flex',flexDirection:'column',gap:4,flexShrink:0}}>
        {!conf?<>
          <button onClick={()=>onEdit(item)} style={{padding:8,background:'none',border:'none',borderRadius:8,cursor:'pointer',color:'#94a3b8'}}><IconEdit/></button>
          <button onClick={()=>setConf(true)} style={{padding:8,background:'none',border:'none',borderRadius:8,cursor:'pointer',color:'#94a3b8'}}><IconTrash/></button>
        </>:<>
          <button onClick={()=>{onDelete(item.id);setConf(false);}} style={{padding:'6px 8px',background:'#dc2626',border:'none',borderRadius:8,cursor:'pointer',color:'white',fontWeight:800,fontSize:11}}>OK</button>
          <button onClick={()=>setConf(false)} style={{padding:6,background:'#f1f5f9',border:'none',borderRadius:8,cursor:'pointer',color:'#64748b'}}><IconX s={14}/></button>
        </>}
      </div>
    </div>
  );
}

function Empty({text}){
  return<div style={{background:'white',borderRadius:12,border:'2px dashed #cbd5e1',padding:32,textAlign:'center',color:'#94a3b8',fontSize:14}}>{text}</div>;
}

/* ══ COBRO ══ */
function CobroSection(){
  const cobro=nextCobro();
  const mes=cobro.date.toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <SHead emoji="💰" title="Próximo cobro" sub="Se cobra el día 28 de cada mes" bg={ACCENT.purpleL}/>
      <div style={{background:'white',borderRadius:16,border:'1px solid #e2e8f0',padding:24,textAlign:'center'}}>
        <div style={{fontSize:13,color:'#94a3b8',marginBottom:4}}>Fecha de cobro</div>
        <div style={{fontSize:22,fontWeight:800,color:'#1e293b',marginBottom:20}}>28 de {mes}</div>
        <div style={{background:ACCENT.purpleL,borderRadius:12,padding:'20px 16px',marginBottom:12}}>
          <div style={{fontSize:13,color:ACCENT.purple,fontWeight:600,marginBottom:8}}>Tiempo restante</div>
          <div style={{display:'flex',alignItems:'baseline',justifyContent:'center',gap:6,flexWrap:'wrap'}}>
            {cobro.weeks>0&&<><span style={{fontSize:52,fontWeight:900,color:ACCENT.purple,lineHeight:1}}>{cobro.weeks}</span><span style={{fontSize:16,color:ACCENT.purple,fontWeight:600}}>sem</span></>}
            {cobro.days>0&&<><span style={{fontSize:52,fontWeight:900,color:'#5b21b6',lineHeight:1,marginLeft:cobro.weeks>0?8:0}}>{cobro.days}</span><span style={{fontSize:16,color:'#5b21b6',fontWeight:600}}>día{cobro.days!==1?'s':''}</span></>}
            {cobro.weeks===0&&cobro.days===0&&<span style={{fontSize:28,fontWeight:800,color:ACCENT.emerald}}>¡Hoy cobras! 🎉</span>}
          </div>
        </div>
        <div style={{fontSize:13,color:'#94a3b8'}}>{cobro.total===1?'¡Mañana cobras! 🎉':`Faltan ${cobro.total} días en total`}</div>
      </div>
    </div>
  );
}

/* ══ VACACIONES ══ */
function VacSection({entries,totales,year,onUpdateE,onUpdateT}){
  const [form,setForm]=useState(false);
  const [ed,setEd]=useState(null);
  const [editT,setEditT]=useState(false);
  const [tInput,setTInput]=useState('');

  const yKey=String(year);
  const totalD=Number(totales[yKey]??0);
  const ye=entries.filter(e=>yearOf(e.fecha)===year);
  const usados=ye.reduce((a,e)=>a+Number(e.dias||0),0);
  const rest=totalD-usados;
  const pct=totalD>0?Math.min(100,(usados/totalD)*100):0;

  const today=new Date();today.setHours(0,0,0,0);
  const futuras=entries.filter(e=>new Date(e.fecha+'T00:00:00')>today).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const proximas=futuras[0]||null;
  const countdown=proximas?weeksAndDays(proximas.fecha):null;

  const abrirTotal=()=>{setTInput(String(totalD||''));setEditT(true);};
  const guardarTotal=()=>{
    const n=parseInt(tInput,10);
    if(isNaN(n)||n<0){alert('Ingresá un número válido');return;}
    onUpdateT({...totales,[yKey]:n});
    setEditT(false);
  };

  const F=[
    {name:'fecha',label:'Fecha de inicio',type:'date',req:true},
    {name:'dias', label:'Cantidad de días',type:'number',min:'1',step:'1',req:true,ph:'Ej: 5'},
    {name:'desc', label:'Nota (opcional)',type:'textarea',ph:'Ej: vacaciones de verano'},
  ];
  const save=e=>{
    const c={...e,dias:Number(e.dias)||0};
    if(ed){onUpdateE(entries.map(i=>i.id===ed.id?{...c,id:ed.id}:i));setEd(null);}
    else{onUpdateE([{...c,id:uid()},...entries]);setForm(false);}
  };

  const inp={width:'100%',padding:'10px 12px',border:'1px solid #cbd5e1',borderRadius:8,fontSize:20,fontWeight:700,boxSizing:'border-box',outline:'none'};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <SHead emoji="🌴" title="Vacaciones" sub={"Días para "+year} bg={ACCENT.emeraldL}/>

      {/* Countdown próximas vacaciones */}
      {countdown&&(
        <div style={{background:ACCENT.emeraldL,borderRadius:14,padding:16,border:'1px solid #6ee7b7'}}>
          <div style={{fontSize:11,color:ACCENT.emerald,fontWeight:700,marginBottom:4,textTransform:'uppercase',letterSpacing:'0.05em'}}>⏳ Próximas vacaciones</div>
          <div style={{fontWeight:700,color:'#065f46',fontSize:14,marginBottom:8}}>{proximas.desc||fmt(proximas.fecha)}</div>
          <div style={{display:'flex',alignItems:'baseline',gap:6,flexWrap:'wrap'}}>
            {countdown.weeks>0&&<><span style={{fontSize:40,fontWeight:900,color:ACCENT.emerald,lineHeight:1}}>{countdown.weeks}</span><span style={{fontSize:15,color:ACCENT.emerald,fontWeight:600}}>semana{countdown.weeks!==1?'s':''}</span></>}
            {countdown.days>0&&<><span style={{fontSize:40,fontWeight:900,color:'#065f46',lineHeight:1,marginLeft:countdown.weeks>0?8:0}}>{countdown.days}</span><span style={{fontSize:15,color:'#065f46',fontWeight:600}}>día{countdown.days!==1?'s':''}</span></>}
            {countdown.weeks===0&&countdown.days===0&&<span style={{fontSize:20,fontWeight:800,color:ACCENT.emerald}}>¡Empiezan hoy! 🎉</span>}
          </div>
          <div style={{fontSize:12,color:'#047857',marginTop:4}}>Inician el {fmt(proximas.fecha)}</div>
        </div>
      )}

      {/* Total anual */}
      <div style={{background:'white',borderRadius:12,border:'1px solid #e2e8f0',padding:16}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <span style={{fontSize:11,textTransform:'uppercase',letterSpacing:'0.05em',color:'#94a3b8',fontWeight:700}}>Días totales del año</span>
          {!editT&&<button onClick={abrirTotal} style={{background:'none',border:'none',cursor:'pointer',color:ACCENT.emerald,fontWeight:600,fontSize:12,display:'flex',alignItems:'center',gap:4,padding:4}}><IconEdit/>{totalD>0?'Cambiar':'Definir'}</button>}
        </div>
        {editT?(
          <div style={{display:'flex',gap:8}}>
            <input type="number" min="0" step="1" value={tInput} autoFocus onChange={e=>setTInput(e.target.value)} style={inp}/>
            <button onClick={guardarTotal} style={{background:ACCENT.emerald,border:'none',borderRadius:8,padding:'0 12px',cursor:'pointer',color:'white',display:'flex',alignItems:'center'}}><IconChk/></button>
            <button onClick={()=>setEditT(false)} style={{background:'#f1f5f9',border:'none',borderRadius:8,padding:'0 10px',cursor:'pointer',color:'#64748b',display:'flex',alignItems:'center'}}><IconX/></button>
          </div>
        ):(
          <span style={{fontSize:30,fontWeight:800,color:'#1e293b'}}>{totalD} <span style={{fontSize:14,fontWeight:400,color:'#94a3b8'}}>días asignados</span></span>
        )}
      </div>

      {/* Stats */}
      <div style={{display:'flex',gap:10}}>
        <Stat label="Usados"      value={usados} unit="días" color={ACCENT.amber}/>
        <Stat label="Disponibles" value={rest}   unit="días" color={rest<0?ACCENT.red:ACCENT.emerald}/>
      </div>

      {/* Barra */}
      {totalD>0&&(
        <div style={{background:'white',borderRadius:12,border:'1px solid #e2e8f0',padding:12}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#94a3b8',marginBottom:6}}><span>Progreso</span><span>{usados} / {totalD} días</span></div>
          <div style={{height:10,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}>
            <div style={{height:'100%',width:pct+'%',background:ACCENT.emerald,borderRadius:99,transition:'width 0.3s'}}/>
          </div>
        </div>
      )}

      <AddBtn label="Registrar vacaciones" color={ACCENT.emerald} onClick={()=>{setEd(null);setForm(true);}}/>
      {(form||ed)&&<Form title={ed?'Editar vacaciones':'Nuevas vacaciones'} fields={F} initial={ed||{fecha:todayISO(),dias:'',desc:''}} onSave={save} onCancel={()=>{setForm(false);setEd(null);}} color={ACCENT.emerald}/>}

      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {ye.length===0&&<Empty text="Sin vacaciones registradas este año"/>}
        {[...ye].sort((a,b)=>a.fecha.localeCompare(b.fecha)).map(it=>{
          const wd=weeksAndDays(it.fecha);
          return(
            <Item key={it.id} item={it} onEdit={setEd} onDelete={id=>onUpdateE(entries.filter(i=>i.id!==id))}>
              <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',gap:8}}>
                <span style={{fontSize:12,color:'#94a3b8'}}>{fmt(it.fecha)}</span>
                <span style={{fontSize:18,fontWeight:800,color:ACCENT.emerald,flexShrink:0}}>{it.dias} {it.dias===1?'día':'días'}</span>
              </div>
              {it.desc&&<div style={{fontSize:13,color:'#475569',marginTop:3}}>{it.desc}</div>}
              {wd&&<div style={{fontSize:12,color:ACCENT.emerald,marginTop:4,fontWeight:600}}>⏳ Faltan {wd.weeks>0?wd.weeks+' sem':''}{wd.weeks>0&&wd.days>0?' y ':''}{wd.days>0?wd.days+' día'+(wd.days!==1?'s':''):''} para empezar</div>}
              {!wd&&<div style={{fontSize:12,color:'#94a3b8',marginTop:4}}>✅ Ya pasaron</div>}
            </Item>
          );
        })}
      </div>
    </div>
  );
}

/* ══ FALLOS ══ */
function FallosSection({items,year,onUpdate}){
  const [form,setForm]=useState(false);
  const [ed,setEd]=useState(null);
  const yi=items.filter(i=>yearOf(i.fecha)===year);
  const mi=yi.filter(i=>monthOf(i.fecha)===CM&&year===CY);
  const F=[{name:'fecha',label:'Fecha',type:'date',req:true},{name:'desc',label:'Descripción',type:'textarea',req:true,ph:'Describe el fallo…'}];
  const save=e=>{if(ed){onUpdate(items.map(i=>i.id===ed.id?{...e,id:ed.id}:i));setEd(null);}else{onUpdate([{...e,id:uid()},...items]);setForm(false);}};
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <SHead emoji="⚠️" title="Fallos" sub="Registro de errores" bg={ACCENT.redL}/>
      <div style={{display:'flex',gap:10}}>
        <Stat label={MESES[CM]} value={mi.length} unit="este mes" color={ACCENT.red}/>
        <Stat label={"Año "+year} value={yi.length} unit="en total" color={ACCENT.red}/>
      </div>
      <AddBtn label="Añadir fallo" color={ACCENT.red} onClick={()=>{setEd(null);setForm(true);}}/>
      {(form||ed)&&<Form title={ed?'Editar fallo':'Nuevo fallo'} fields={F} initial={ed||{fecha:todayISO(),desc:''}} onSave={save} onCancel={()=>{setForm(false);setEd(null);}} color={ACCENT.red}/>}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {yi.length===0&&<Empty text="Sin fallos registrados este año"/>}
        {[...yi].sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(it=>(
          <Item key={it.id} item={it} onEdit={setEd} onDelete={id=>onUpdate(items.filter(i=>i.id!==id))}>
            <div style={{fontSize:12,color:'#94a3b8'}}>{fmt(it.fecha)}</div>
            <div style={{fontSize:14,color:'#1e293b',marginTop:3,wordBreak:'break-word'}}>{it.desc}</div>
          </Item>
        ))}
      </div>
    </div>
  );
}

/* ══ HORAS EXTRAS ══ */
function HorasSection({items,year,onUpdate}){
  const [form,setForm]=useState(false);
  const [ed,setEd]=useState(null);
  const yi=items.filter(i=>yearOf(i.fecha)===year);
  const mi=yi.filter(i=>monthOf(i.fecha)===CM&&year===CY);
  const sum=a=>a.reduce((s,i)=>s+Number(i.horas||0),0);
  const F=[{name:'fecha',label:'Fecha',type:'date',req:true},{name:'horas',label:'Horas',type:'number',step:'0.5',min:'0',req:true,ph:'Ej: 2.5'},{name:'desc',label:'Nota (opcional)',type:'textarea',ph:'Motivo…'}];
  const save=e=>{const c={...e,horas:Number(e.horas)||0};if(ed){onUpdate(items.map(i=>i.id===ed.id?{...c,id:ed.id}:i));setEd(null);}else{onUpdate([{...c,id:uid()},...items]);setForm(false);}};
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <SHead emoji="⏱️" title="Horas extras" sub="Horas fuera de horario" bg={ACCENT.blueL}/>
      <div style={{display:'flex',gap:10}}>
        <Stat label={MESES[CM]} value={sum(mi)} unit="horas este mes" color={ACCENT.blue}/>
        <Stat label={"Año "+year} value={sum(yi)} unit="horas en total" color={ACCENT.blue}/>
      </div>
      <AddBtn label="Añadir horas extras" color={ACCENT.blue} onClick={()=>{setEd(null);setForm(true);}}/>
      {(form||ed)&&<Form title={ed?'Editar horas':'Nuevas horas extras'} fields={F} initial={ed||{fecha:todayISO(),horas:'',desc:''}} onSave={save} onCancel={()=>{setForm(false);setEd(null);}} color={ACCENT.blue}/>}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {yi.length===0&&<Empty text="Sin horas extras este año"/>}
        {[...yi].sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(it=>(
          <Item key={it.id} item={it} onEdit={setEd} onDelete={id=>onUpdate(items.filter(i=>i.id!==id))}>
            <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',gap:8}}>
              <span style={{fontSize:12,color:'#94a3b8'}}>{fmt(it.fecha)}</span>
              <span style={{fontSize:20,fontWeight:800,color:ACCENT.blue}}>{it.horas} h</span>
            </div>
            {it.desc&&<div style={{fontSize:13,color:'#475569',marginTop:3,wordBreak:'break-word'}}>{it.desc}</div>}
          </Item>
        ))}
      </div>
    </div>
  );
}

/* ══ INCIDENCIAS ══ */
function IncidSection({items,year,onUpdate}){
  const [form,setForm]=useState(false);
  const [ed,setEd]=useState(null);
  const yi=items.filter(i=>yearOf(i.fecha)===year);
  const mi=yi.filter(i=>monthOf(i.fecha)===CM&&year===CY);
  const F=[{name:'fecha',label:'Fecha',type:'date',req:true},{name:'titulo',label:'Título',type:'text',req:true,ph:'Ej: Reclamo de cliente'},{name:'desc',label:'Descripción',type:'textarea',req:true,ph:'Detalla la incidencia…'}];
  const save=e=>{if(ed){onUpdate(items.map(i=>i.id===ed.id?{...e,id:ed.id}:i));setEd(null);}else{onUpdate([{...e,id:uid()},...items]);setForm(false);}};
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <SHead emoji="📋" title="Incidencias" sub="Cuestiones del trabajo" bg={ACCENT.amberL}/>
      <div style={{display:'flex',gap:10}}>
        <Stat label={MESES[CM]} value={mi.length} unit="este mes" color={ACCENT.amber}/>
        <Stat label={"Año "+year} value={yi.length} unit="en total" color={ACCENT.amber}/>
      </div>
      <AddBtn label="Añadir incidencia" color={ACCENT.amber} onClick={()=>{setEd(null);setForm(true);}}/>
      {(form||ed)&&<Form title={ed?'Editar incidencia':'Nueva incidencia'} fields={F} initial={ed||{fecha:todayISO(),titulo:'',desc:''}} onSave={save} onCancel={()=>{setForm(false);setEd(null);}} color={ACCENT.amber}/>}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {yi.length===0&&<Empty text="Sin incidencias este año"/>}
        {[...yi].sort((a,b)=>b.fecha.localeCompare(a.fecha)).map(it=>(
          <Item key={it.id} item={it} onEdit={setEd} onDelete={id=>onUpdate(items.filter(i=>i.id!==id))}>
            <div style={{fontSize:12,color:'#94a3b8'}}>{fmt(it.fecha)}</div>
            {it.titulo&&<div style={{fontSize:14,fontWeight:700,color:'#1e293b',marginTop:3}}>{it.titulo}</div>}
            <div style={{fontSize:13,color:'#475569',marginTop:3,wordBreak:'break-word'}}>{it.desc}</div>
          </Item>
        ))}
      </div>
    </div>
  );
}

/* ══ APP PRINCIPAL ══ */
function App(){
  const [tab,setTab]=useState('vacaciones');
  const [year,setYear]=useState(CY);
  const [fallos,setFallos]=useState([]);
  const [horas,setHoras]=useState([]);
  const [vacE,setVacE]=useState([]);
  const [vacT,setVacT]=useState({});
  const [incid,setIncid]=useState([]);

  useEffect(()=>{
    const f=lsLoad('fallos');if(Array.isArray(f))setFallos(f);
    const h=lsLoad('horas');if(Array.isArray(h))setHoras(h);
    const ve=lsLoad('vac-e');if(Array.isArray(ve))setVacE(ve);
    const vt=lsLoad('vac-t');if(vt&&typeof vt==='object')setVacT(vt);
    const i=lsLoad('incid');if(Array.isArray(i))setIncid(i);
  },[]);

  const sf=d=>{setFallos(d);lsSave('fallos',d);};
  const sh=d=>{setHoras(d);lsSave('horas',d);};
  const sve=d=>{setVacE(d);lsSave('vac-e',d);};
  const svt=d=>{setVacT(d);lsSave('vac-t',d);};
  const si=d=>{setIncid(d);lsSave('incid',d);};

  const ys=[];for(let y=CY+1;y>=CY-4;y--)ys.push(y);
  const showYear=tab!=='cobro';

  const TABS=[
    {id:'vacaciones', label:'Vacaciones',emoji:'🌴'},
    {id:'cobro',      label:'Cobro',     emoji:'💰'},
    {id:'fallos',     label:'Fallos',    emoji:'⚠️'},
    {id:'horas',      label:'H.Extras',  emoji:'⏱️'},
    {id:'incidencias',label:'Más',       emoji:'📋'},
  ];

  return(
    <div style={{minHeight:'100svh',display:'flex',flexDirection:'column',background:'#f8fafc',fontFamily:'system-ui,-apple-system,sans-serif'}}>
      <div style={{background:'#1e293b',color:'white',padding:'12px 16px',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
        <span style={{fontSize:20}}>💼</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:15}}>Recursos Humanos</div>
          <div style={{fontSize:11,color:'#94a3b8'}}>Panel de seguimiento</div>
        </div>
        {showYear&&(
          <div style={{position:'relative'}}>
            <select value={year} onChange={e=>setYear(Number(e.target.value))}
              style={{appearance:'none',background:'#334155',color:'white',border:'none',borderRadius:8,padding:'6px 28px 6px 10px',fontWeight:600,fontSize:14,cursor:'pointer'}}>
              {ys.map(y=><option key={y} value={y}>{y}</option>)}
            </select>
            <span style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',color:'#94a3b8',fontSize:10}}>▾</span>
          </div>
        )}
      </div>

      <div style={{flex:1,overflowY:'auto',padding:16,paddingBottom:80}}>
        {tab==='vacaciones' &&<VacSection    entries={vacE} totales={vacT} year={year} onUpdateE={sve} onUpdateT={svt}/>}
        {tab==='cobro'      &&<CobroSection/>}
        {tab==='fallos'     &&<FallosSection items={fallos} year={year} onUpdate={sf}/>}
        {tab==='horas'      &&<HorasSection  items={horas}  year={year} onUpdate={sh}/>}
        {tab==='incidencias'&&<IncidSection  items={incid}  year={year} onUpdate={si}/>}
      </div>

      <div style={{position:'fixed',bottom:0,left:0,right:0,background:'white',borderTop:'1px solid #e2e8f0',display:'grid',gridTemplateColumns:'repeat(5,1fr)',zIndex:99}}>
        {TABS.map(({id,label,emoji})=>{
          const active=tab===id;
          return(
            <button key={id} onClick={()=>setTab(id)}
              style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'7px 2px',background:active?'#f8fafc':'white',border:'none',cursor:'pointer'}}>
              <span style={{fontSize:19,lineHeight:1}}>{emoji}</span>
              <span style={{fontSize:9,fontWeight:600,marginTop:2,color:active?'#1e293b':'#94a3b8',whiteSpace:'nowrap'}}>{label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
